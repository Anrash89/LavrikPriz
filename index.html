<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Розыгрыш • Женя Лаврик</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,500;1,600&family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  background:#f7f4ff;
  font-family:'Raleway',sans-serif;
  color:#1e0e4b;
  display:flex;align-items:center;justify-content:center;
}

/* ── BLOBS ── */
.blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(100px);}
.b1{width:800px;height:800px;background:rgba(196,162,255,0.16);top:-200px;left:-200px;animation:bf1 16s ease-in-out infinite alternate;}
.b2{width:600px;height:600px;background:rgba(167,139,250,0.12);bottom:-150px;right:-150px;animation:bf2 13s ease-in-out infinite alternate;}
.b3{width:350px;height:350px;background:rgba(233,213,255,0.18);top:35%;left:55%;animation:bf3 10s ease-in-out infinite alternate;}
@keyframes bf1{to{transform:translate(40px,30px)scale(1.06);}}
@keyframes bf2{to{transform:translate(-30px,20px)scale(1.08);}}
@keyframes bf3{to{transform:translate(-20px,-25px)scale(1.1);}}

/* ── LAYOUT ── */
.wrap{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  width:min(540px,96vw);
  gap:0;
}
.eyebrow{
  font-weight:300;font-size:9px;letter-spacing:.6em;
  text-transform:uppercase;color:#b197fc;
  margin-bottom:8px;text-align:center;
}
.brand{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;
  font-size:clamp(38px,8vw,58px);line-height:1;
  letter-spacing:-.01em;text-align:center;
  background:linear-gradient(140deg,#3b1285 0%,#7c3aed 50%,#a855f7 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:12px;
}
.sep{display:flex;align-items:center;gap:12px;width:100%;margin-bottom:20px;}
.sep-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(196,162,255,0.5));}
.sep-line.r{background:linear-gradient(90deg,rgba(196,162,255,0.5),transparent);}
.sep-diamond{width:5px;height:5px;background:#c4a2ff;transform:rotate(45deg);flex-shrink:0;}

.prize{
  display:inline-flex;align-items:center;gap:10px;
  background:rgba(255,255,255,0.7);
  border:1px solid rgba(196,162,255,0.4);
  border-radius:60px;padding:9px 26px;
  margin-bottom:24px;
  box-shadow:0 4px 20px rgba(124,58,237,0.08);
  backdrop-filter:blur(12px);
}
.prize-icon{font-size:18px;}
.prize-text{
  font-weight:300;font-size:11px;letter-spacing:.25em;
  text-transform:uppercase;
  background:linear-gradient(90deg,#92400e,#b45309,#d97706);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

/* ── DRUM CARD ── */
.drum-card{
  width:100%;
  background:rgba(255,255,255,0.68);
  border:1px solid rgba(196,162,255,0.3);
  border-radius:28px;
  box-shadow:0 8px 40px rgba(124,58,237,0.1),0 2px 8px rgba(124,58,237,0.05),inset 0 1px 0 rgba(255,255,255,1);
  backdrop-filter:blur(24px);
  overflow:hidden;
  position:relative;
  padding:0;
  margin-bottom:20px;
}
.drum-top,.drum-bot{position:absolute;left:0;right:0;height:8px;z-index:5;}
.drum-top{top:0;background:linear-gradient(90deg,transparent 5%,rgba(196,162,255,0.25) 50%,transparent 95%);}
.drum-bot{bottom:0;background:linear-gradient(90deg,transparent 5%,rgba(196,162,255,0.25) 50%,transparent 95%);}
.drum-card::before,.drum-card::after{
  content:'';position:absolute;top:0;bottom:0;width:1px;z-index:5;
  background:linear-gradient(to bottom,transparent 5%,rgba(196,162,255,0.3) 50%,transparent 95%);
}
.drum-card::before{left:20px;}
.drum-card::after{right:20px;}
.fade-top,.fade-bot{position:absolute;left:0;right:0;height:140px;z-index:4;pointer-events:none;}
.fade-top{top:0;background:linear-gradient(to bottom,rgba(247,244,255,0.98) 0%,rgba(247,244,255,0.85) 30%,rgba(247,244,255,0.4) 65%,transparent 100%);}
.fade-bot{bottom:0;background:linear-gradient(to top,rgba(247,244,255,0.98) 0%,rgba(247,244,255,0.85) 30%,rgba(247,244,255,0.4) 65%,transparent 100%);}
.center-frame{
  position:absolute;top:50%;transform:translateY(-50%);
  left:28px;right:28px;height:72px;z-index:3;pointer-events:none;
  border-radius:14px;
  background:linear-gradient(90deg,rgba(196,162,255,0.06) 0%,rgba(196,162,255,0.14) 30%,rgba(196,162,255,0.18) 50%,rgba(196,162,255,0.14) 70%,rgba(196,162,255,0.06) 100%);
  border:1px solid rgba(196,162,255,0.35);
  box-shadow:0 0 20px rgba(196,162,255,0.08);
}
.center-frame::before,.center-frame::after{
  content:'◆';position:absolute;top:50%;transform:translateY(-50%);
  font-size:6px;color:rgba(196,162,255,0.7);line-height:1;
}
.center-frame::before{left:-16px;}
.center-frame::after{right:-16px;}
#drumCanvas{display:block;width:100%;image-rendering:crisp-edges;}

/* ══════════════════════════════════
   CURTAINS
══════════════════════════════════ */
.curt-wrap{
  position:absolute;inset:0;z-index:20;
  display:flex;
  border-radius:27px;
  overflow:hidden;
}

.curt{
  flex:1;height:100%;
  transition:transform 0.88s cubic-bezier(0.76,0,0.24,1);
  position:relative;overflow:hidden;
}
/* Left panel */
.curt-l{
  background:linear-gradient(160deg,#2e1065 0%,#4c1d95 30%,#6d28d9 65%,#7c3aed 100%);
  border-right:1px solid rgba(196,162,255,0.18);
}
/* Right panel */
.curt-r{
  background:linear-gradient(200deg,#2e1065 0%,#4c1d95 30%,#6d28d9 65%,#7c3aed 100%);
}
/* Diagonal stripe texture */
.curt::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    -52deg,transparent,transparent 14px,
    rgba(255,255,255,0.028) 14px,rgba(255,255,255,0.028) 28px
  );
}
/* Gleam on left edge of each panel */
.curt-l::before{
  content:'';position:absolute;top:0;bottom:0;right:0;width:32px;
  background:linear-gradient(to right,transparent,rgba(196,162,255,0.12));
}
.curt-r::before{
  content:'';position:absolute;top:0;bottom:0;left:0;width:32px;
  background:linear-gradient(to left,transparent,rgba(196,162,255,0.12));
}

/* OPEN STATE — panels slide apart */
.curt-wrap.open .curt-l{transform:translateX(-100%);}
.curt-wrap.open .curt-r{transform:translateX(100%);}
.curt-wrap.open{pointer-events:none;}

/* Content shown while curtains are closed */
.curt-info{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:21;text-align:center;pointer-events:none;
  width:85%;
  transition:opacity 0.2s ease;
}
.curt-wrap.open .curt-info{opacity:0;}

.curt-emoji{
  font-size:44px;line-height:1;margin-bottom:14px;display:block;
  filter:drop-shadow(0 4px 16px rgba(196,162,255,0.6));
}
.curt-title{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;
  font-size:clamp(26px,5.5vw,36px);
  color:rgba(255,255,255,0.96);
  line-height:1.1;margin-bottom:8px;
  text-shadow:0 2px 20px rgba(109,40,217,0.4);
}
.curt-prize-text{
  font-family:'Raleway',sans-serif;font-weight:200;
  font-size:10px;letter-spacing:0.45em;text-transform:uppercase;
  color:rgba(255,255,255,0.55);
  margin-bottom:22px;
}
.curt-hint{
  font-family:'Raleway',sans-serif;font-weight:300;
  font-size:9px;letter-spacing:0.4em;text-transform:uppercase;
  color:rgba(255,255,255,0.3);
  animation:curtpulse 2.2s ease-in-out infinite;
}
@keyframes curtpulse{0%,100%{opacity:0.3;}50%{opacity:0.65;}}

/* ── BUTTON ── */
.btn{
  width:100%;max-width:340px;
  padding:17px 40px;border:none;border-radius:60px;
  background:linear-gradient(135deg,#6d28d9 0%,#8b5cf6 50%,#7c3aed 100%);
  color:#fff;font-family:'Raleway';font-weight:400;
  font-size:11px;letter-spacing:.4em;text-transform:uppercase;
  cursor:pointer;
  box-shadow:0 10px 36px rgba(109,40,217,0.38),0 2px 8px rgba(109,40,217,0.2);
  transition:transform .2s,box-shadow .25s;
  position:relative;overflow:hidden;
  margin-bottom:16px;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,0.18) 50%,transparent 65%);
  transform:translateX(-100%);transition:transform .55s;
}
.btn:hover:not(:disabled)::after{transform:translateX(100%);}
.btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 14px 44px rgba(109,40,217,0.48);}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none!important;}

/* ── RESULT ── */
.result{
  opacity:0;transform:translateY(14px);pointer-events:none;
  transition:opacity .55s ease,transform .55s ease;
  text-align:center;
}
.result.show{opacity:1;transform:translateY(0);pointer-events:all;}
.res-lbl{font-weight:200;font-size:9px;letter-spacing:.5em;text-transform:uppercase;color:#b197fc;margin-bottom:6px;}
.res-emojis{font-size:22px;letter-spacing:10px;margin-bottom:16px;animation:bob .6s ease-in-out infinite alternate;}
@keyframes bob{from{transform:translateY(0);}to{transform:translateY(-5px);}}
.btn-sm{
  padding:9px 28px;border:1px solid rgba(196,162,255,0.4);
  border-radius:60px;background:transparent;
  color:#9f7bea;font-family:'Raleway';font-weight:300;
  font-size:10px;letter-spacing:.3em;text-transform:uppercase;
  cursor:pointer;transition:all .2s;
}
.btn-sm:hover{border-color:#7c3aed;color:#7c3aed;background:rgba(124,58,237,0.04);}

@keyframes rotspin{to{transform:rotate(360deg);}}
.sp{display:inline-block;width:11px;height:11px;border:1.5px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:rotspin .65s linear infinite;vertical-align:middle;margin-right:8px;}

#cnf{position:fixed;inset:0;pointer-events:none;z-index:99;}
</style>
</head>

<div class="b1 blob"></div>

<div class="wrap">
  <div class="eyebrow">официальный розыгрыш</div>
  <div class="brand">Женя Лаврик</div>

    <div class="sep-line"></div>

  </div>

  <div class="drum-card">

    <!-- ═══ ШТОРКИ — раскрываются при нажатии кнопки ═══ -->
    <div class="curt-wrap" id="curtains">
      <div class="curt curt-l"></div>
      <div class="curt curt-r"></div>

        <div class="curt-prize-text">Поездка в Турцию</div>
        <div class="curt-hint">нажмите, чтобы начать</div>
      </div>
    </div>

    <div class="drum-top"></div>
    <div class="drum-bot"></div>
    <div class="fade-top"></div>
    <div class="fade-bot"></div>
    <div class="center-frame"></div>
    <canvas id="drumCanvas"></canvas>
  </div>

  <button class="btn" id="btn">Начать розыгрыш ✈️</button>
  <div class="result" id="res">
    <div class="res-lbl">победитель розыгрыша</div>
    <div class="res-emojis">🎉 ✨ 🏆 ✨ 🎉</div>
    <button class="btn-sm" id="btnR">Провести снова</button>

</div>

const WINNER          = 'semeynaya_mariya';
// Ники, которые окажутся прямо НАД победителем в барабане:
const BEFORE_WINNER   = ['tanastr', 'tatiana_bicak'];
// Ники, которые окажутся прямо ПОД победителем:
const AFTER_WINNER    = ['bosforovna_marafon', 'surgeonelena'];

function buildAll(raw) {
  const special  = new Set([WINNER, ...BEFORE_WINNER, ...AFTER_WINNER]);
  const filtered = raw.filter(n => !special.has(n));
  const insertAt = Math.max(8, Math.floor(filtered.length * 0.4));
  return [
    ...filtered.slice(0, insertAt),
    ...BEFORE_WINNER,
    WINNER,
    ...AFTER_WINNER,
    ...filtered.slice(insertAt),
  ];
}

  canvas.style.width  = w + 'px';
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(devicePixelRatio, devicePixelRatio);
  canvasW = w;
}
let canvasW = 0;
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); drawFrame(); });

const font1 = new FontFace('Cormorant Garamond','url(https://fonts.gstatic.com/s/cormorantgaramond/v21/co3YmX5slCNuHLi8bLeY9MK7whWMhyjornFLsS6V7w.woff2)',{style:'italic',weight:'600'});
const font2 = new FontFace('Raleway','url(https://fonts.gstatic.com/s/raleway/v34/1Ptug8zYS_SKggPNyC0IT4ttDfA.woff2)',{weight:'300'});
Promise.allSettled([font1.load(), font2.load()]).then(results => {
  results.forEach(r => r.status==='fulfilled' && document.fonts.add(r.value));
  drawFrame();
});

let scrollPos = 0;
let spinDone  = false;

function getNameAt(index) {
  const n = ALL.length;
  return ALL[((index % n) + n) % n];
}

function drawFrame() {
  const w = canvasW;
  ctx.clearRect(0, 0, w, DRUM_H);
  const topItem = Math.floor(scrollPos);
  const offset  = scrollPos - topItem;
  for (let i = -1; i <= VISIBLE + 1; i++) {
    const name = getNameAt(topItem + i);
    const y    = (i - offset) * ITEM_H + ITEM_H / 2;
    const dist = Math.abs(y - CENTER_Y);
    const maxD = ITEM_H * 2.8;
    const prox = Math.max(0, 1 - dist / maxD);
    const scale = 0.68 + 0.55 * Math.pow(prox, 1.4);
    const alpha = 0.18 + 0.82 * Math.pow(prox, 1.2);
    const isCenter = dist < ITEM_H * 0.5;
    const isWinner = isCenter && name === WINNER && spinDone;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(w / 2, y);
    ctx.scale(scale, scale);

    if (isWinner) {
      ctx.font = `italic 600 ${Math.round(26/scale)}px 'Cormorant Garamond', serif`;
      const grd = ctx.createLinearGradient(-120,0,120,0);
      grd.addColorStop(0,'#6d28d9');
      grd.addColorStop(0.4,'#7c3aed');
      grd.addColorStop(0.7,'#c4a2ff');
      grd.addColorStop(1,'#d4aa70');
      ctx.fillStyle = grd;
    } else if (isCenter) {
      ctx.font = `italic 600 ${Math.round(24/scale)}px 'Cormorant Garamond', serif`;
      ctx.fillStyle = '#1e0e4b';
    } else {
      ctx.font = `300 ${Math.round(18/scale)}px 'Raleway', sans-serif`;
      const l = Math.round(60 + 30 * (1 - prox));
      ctx.fillStyle = `hsl(270,35%,${l}%)`;
    }

    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('@' + name, 0, 0);
    ctx.restore();
  }
}
drawFrame();

// ── SPIN LOGIC ───────────────────────────────────────────────────

const TOTAL_MS = 40000;
const ACCEL_MS = 1500;
const DECEL_MS = 5500;
const FAST_MS  = TOTAL_MS - ACCEL_MS - DECEL_MS;
const MAX_SPD  = 3.2;

const ACCEL_DIST = MAX_SPD * (ACCEL_MS / 1000 * 60) / 3;
const FAST_DIST  = MAX_SPD * (FAST_MS  / 1000 * 60);
const DECEL_DIST = MAX_SPD * (DECEL_MS / 1000 * 60) / 5;
const CENTER_SLOT = Math.round((CENTER_Y - ITEM_H / 2) / ITEM_H);

function findWinnerTarget(startPos) {
  const n  = ALL.length;
  const est = startPos + ACCEL_DIST + FAST_DIST;
  const lo  = Math.ceil(est) + 20;
  const hi  = lo + Math.ceil(DECEL_DIST) + n;
  for (let i = lo; i < hi + n; i++) {
    if (getNameAt(i) === WINNER) return i - CENTER_SLOT;
  }
  return est + DECEL_DIST / 2;
}

let raf       = null;
let isSpinning = false;

function randomStart() { return Math.floor(Math.random() * ALL.length); }

const btn        = document.getElementById('btn');
const btnR       = document.getElementById('btnR');
const resEl      = document.getElementById('res');
const curtainsEl = document.getElementById('curtains');

btn.addEventListener('click',  openAndSpin);
btnR.addEventListener('click', reset);

function openAndSpin() {
  if (isSpinning) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="sp"></span>Открываем...';

  // Open the curtains
  curtainsEl.classList.add('open');

  // Wait for curtains to fully open, then spin
  setTimeout(() => {
    startSpin();
  }, 960);
}

function startSpin() {
  isSpinning = true;
  spinDone   = false;
  cancelAnimationFrame(raf);
  resEl.classList.remove('show');
  btn.innerHTML = '<span class="sp"></span>Крутим...';

  scrollPos = randomStart();
  drawFrame();

  const targetPos = findWinnerTarget(scrollPos);
  const t0        = performance.now();
  let decelStart  = null;

  function frame(now) {
    const el = now - t0;

    if (el < ACCEL_MS) {
      const t = el / ACCEL_MS;
      scrollPos += MAX_SPD * t * t;
    } else if (el < ACCEL_MS + FAST_MS) {
      scrollPos += MAX_SPD;
    } else {
      if (decelStart === null) decelStart = scrollPos;
      const t    = Math.min((el - ACCEL_MS - FAST_MS) / DECEL_MS, 1);
      const ease = 1 - Math.pow(1 - t, 5);
      scrollPos  = decelStart + (targetPos - decelStart) * ease;
      if (t >= 1) {
        scrollPos = targetPos;
        drawFrame();
        onDone();
        return;
      }
    }

    drawFrame();
    raf = requestAnimationFrame(frame);
  }

  raf = requestAnimationFrame(frame);
}

function onDone() {
  isSpinning = false;
  spinDone   = true;
  drawFrame();
  btn.innerHTML = '✨ Победитель определён';
  setTimeout(() => { resEl.classList.add('show'); confetti(); }, 400);
}

function reset() {
  cancelAnimationFrame(raf);
  isSpinning = false;
  spinDone   = false;
  resEl.classList.remove('show');

  // Curtains close
  curtainsEl.classList.remove('open');
  btn.innerHTML = 'Начать розыгрыш ✈️';
  btn.disabled  = true; // stay disabled while curtains close

  // Re-enable once curtains are back
  setTimeout(() => { btn.disabled = false; }, 920);

  scrollPos = randomStart();
  drawFrame();
}

// ── CONFETTI ─────────────────────────────────────────────────────

function confetti() {
  const cv = document.getElementById('cnf');
  const cx = cv.getContext('2d');
  cv.width = innerWidth; cv.height = innerHeight;
  const cols = ['#c084fc','#a855f7','#7c3aed','#ddd6fe','#d4aa70','#fde68a','#fff','#f5d0fe','#e9d5ff'];
  const ps = Array.from({length:180}, () => {
    const a = Math.random()*Math.PI*2, sp = 5+Math.random()*14;
    return {
      x:innerWidth*(.1+Math.random()*.8), y:innerHeight*(.05+Math.random()*.5),
      vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-6,
      rot:Math.random()*360, vr:(Math.random()-.5)*16,
      col:cols[~~(Math.random()*cols.length)],
      w:4+Math.random()*7,
      h:Math.random()>.45?4+Math.random()*7:2+Math.random()*3,
      al:1
    };
  });
  let live = true;
  function draw() {
    if (!live) return;
    cx.clearRect(0,0,cv.width,cv.height);
    let any = false;
    ps.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.vy+=.2; p.vx*=.99;
      p.rot+=p.vr; p.al-=.011;
      if(p.al<=0) return;
      any=true;
      cx.save(); cx.globalAlpha=p.al;
      cx.translate(p.x,p.y); cx.rotate(p.rot*Math.PI/180);
      cx.fillStyle=p.col; cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      cx.restore();
    });
    if (any) requestAnimationFrame(draw);
    else { cx.clearRect(0,0,cv.width,cv.height); live=false; }
  }
  draw();
}
</script>
</body>
